<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found — TermTux</title>
  <meta name="description" content="The page you requested was not found. Return to TermTux, the premium Linux commands directory.">
  <meta name="theme-color" content="#E95420">
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23E95420'/><text x='50' y='68' font-size='50' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'>T</text></svg>" type="image/svg+xml">
  
  <link rel="stylesheet" href="/css/yaru-tokens.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">

  <!-- Prevent FOUC on dark mode -->
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <div class="app-shell" style="align-items: center; justify-content: center; width: 100%; min-height: 100vh;">
    <main class="empty-state" style="max-width: 400px; text-align: center;">
      <div class="empty-state-icon" style="font-size: 72px; color: var(--yaru-orange); opacity: 1;" aria-hidden="true">404</div>
      <h1>Page Not Found</h1>
      <p style="margin-top: var(--space-sm); color: var(--text-secondary);">The page, command, or category you are looking for does not exist.</p>
      <a href="/" class="github-link mt-lg" style="display: inline-flex; justify-content: center; background: var(--yaru-orange); color: var(--text-inverse); border: none; padding: 10px 24px; font-weight: 500;">Go to Home</a>
    </main>
  </div>
</body>
</html>
