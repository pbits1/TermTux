<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category — TermTux</title>
  <meta name="description" content="View Linux commands and instructions by category. Easy-to-follow guides with copy-to-clipboard functionality.">
  <meta name="theme-color" content="#E95420">
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23E95420'/><text x='50' y='68' font-size='50' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'>T</text></svg>" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  
  <link rel="stylesheet" href="css/yaru-tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">

  <!-- Prevent FOUC on dark mode -->
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>

  <a href="#main" class="sr-only" style="position:absolute;top:-100px;left:0;z-index:9999;background:var(--yaru-orange);color:white;padding:8px 16px;font-size:14px;" onfocus="this.style.top='0'" onblur="this.style.top='-100px'">Skip to main content</a>

  <div class="app-shell">
    
    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay" role="presentation"></div>
    
    <!-- Sidebar -->
    <aside class="sidebar" aria-label="Category navigation">
      <div class="sidebar-header" style="cursor: pointer;" onclick="window.location.href='index.html'" tabindex="0" role="button" aria-label="Go to Home Page">
        <svg class="sidebar-logo" viewBox="0 0 24 24" fill="none" stroke="var(--yaru-orange)" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"></path><path d="M2 12h20"></path></svg>
        <div>
          <div class="sidebar-title">TermTux</div>
          <div class="sidebar-subtitle">Linux Reference</div>
        </div>
      </div>
      
      <nav class="sidebar-nav" id="sidebarNav" aria-label="Categories">
        <!-- Rendered by app.js -->
      </nav>
      
      <div class="sidebar-footer">
        <a href="https://github.com/pbits1/TermTux" target="_blank" rel="noopener noreferrer" class="github-link" aria-label="View source on GitHub">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"></path></svg>
          GitHub Repo
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main">
      
      <!-- Top Bar -->
      <header class="top-bar" role="banner">
        <button class="menu-toggle" id="menuToggle" aria-label="Open navigation menu" aria-expanded="false">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        
        <div class="search-container" role="search">
          <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <input type="search" class="search-input" id="searchInput" placeholder="Search commands, tools, fixes..." aria-label="Search commands" autocomplete="off">
          <kbd class="search-shortcut">Ctrl+K</kbd>
          <div class="search-results" id="searchResults" role="listbox" aria-label="Search results"></div>
        </div>
        
        <div style="flex: 1"></div>
        
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="icon-sun" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
          <svg class="icon-moon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
      </header>

      <div class="content-body fade-in-up">
        
        <!-- Breadcrumbs -->
        <nav class="breadcrumbs" aria-label="Breadcrumb">
          <a href="index.html">Home</a>
          <span class="separator" aria-hidden="true">/</span>
          <span id="breadcrumbSection">Section</span>
          <span class="separator" aria-hidden="true">/</span>
          <span id="breadcrumbCategory" style="color: var(--text-primary); font-weight: 500;">Category</span>
        </nav>

        <!-- Category Tags -->
        <div id="categoryTags" class="tag-list mt-sm mb-lg"></div>
        
        <!-- Markdown Content gets injected here -->
        <div id="mainContent" class="mt-md">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-line" style="width: 80%"></div>
          <div class="skeleton skeleton-line" style="width: 60%"></div>
          <div class="skeleton skeleton-block"></div>
        </div>
        
      </div>
    </main>
  </div>
  
  <button class="back-to-top" id="backToTop" aria-label="Back to top">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
  </button>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered.'))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
  <script>
    // Handle Enter key for sidebar header accessibility
    document.querySelector('.sidebar-header').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
